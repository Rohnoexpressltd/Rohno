<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Rohno Express</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:12px;
background:#163a63;
color:white;
border:none;
cursor:pointer;
}

.disclaimer{
font-size:13px;
margin-top:20px;
line-height:1.6;
}

footer{
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Contact Rohno Express</h1>

<form>

<input type="text" placeholder="Name" required>

<input type="email" placeholder="Email" required>

<input type="tel" placeholder="Phone Number" required>

<textarea rows="5" placeholder="Message"></textarea>

<button type="submit">Submit</button>

</form>

<div class="disclaimer">

<p>
By clicking SUBMIT you consent to receiving SMS messages from Rohno Express.
</p>

<ul>
<li>Messages and Data rates may apply. Message frequency will vary.</li>
<li>Reply HELP for assistance.</li>
<li>Reply STOP to opt-out of messaging.</li>
</ul>

</div>

</div>

<footer>
<a href="privacy.html">Privacy Policy</a>
</footer>

</body>
</html>
